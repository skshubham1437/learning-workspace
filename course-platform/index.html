<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Hub — Course Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>
        <aside class="sidebar" id="sidebar" role="navigation" aria-label="Course navigation">
            <div class="sidebar-header">
                <div class="logo-wrap">
                    <span class="logo-icon">⚡</span>
                    <h2>Learning Hub</h2>
                </div>
                <div class="course-picker">
                    <select id="course-select" class="course-select" aria-label="Select course">
                        <!-- Dynamically populated by JS -->
                    </select>
                </div>
            </div>
            <!-- Flashcard Decks Section -->
            <div class="sidebar-flashcards" id="sidebar-flashcards">
                <div class="sidebar-section-label">
                    <span class="section-icon">🃏</span>
                    <span>Flashcard Review</span>
                </div>
                <ul class="deck-list" id="deck-list">
                    <!-- Dynamically populated by JS -->
                </ul>
            </div>
            <div class="sidebar-divider"></div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Dynamically populated by JS -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- App Header -->
            <header class="app-header">
                <div class="header-left">
                    <button id="menu-toggle-btn" class="icon-btn" aria-label="Toggle Sidebar" aria-expanded="true">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <nav class="breadcrumbs" id="breadcrumbs" aria-label="Breadcrumb">
                        <!-- Dynamically populated by JS -->
                    </nav>
                </div>

                <div class="header-right">
                    <button id="header-search-btn" class="search-trigger-btn" aria-label="Search lessons" title="Search lessons (Cmd+K)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <span class="search-label">Search...</span>
                        <kbd>⌘K</kbd>
                    </button>

                    <button id="theme-toggle-btn" class="icon-btn theme-btn" aria-label="Toggle Theme" title="Switch Theme">
                        <!-- Sun/Moon icons dynamically injected or toggled -->
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                </div>
            </header>

            <div class="iframe-container" id="iframe-container">
                <iframe id="content-frame" name="content-frame" title="Lesson Content"></iframe>
            </div>

            <!-- Flashcard Review View (hidden by default) -->
            <div class="flashcard-view" id="flashcard-view" style="display: none;">
                <!-- Stats Bar -->
                <div class="fc-stats-bar">
                    <div class="fc-stat">
                        <span class="fc-stat-value" id="fc-due-count">0</span>
                        <span class="fc-stat-label">Due</span>
                    </div>
                    <div class="fc-stat">
                        <span class="fc-stat-value" id="fc-reviewed-count">0</span>
                        <span class="fc-stat-label">Reviewed</span>
                    </div>
                    <div class="fc-stat">
                        <span class="fc-stat-value" id="fc-mastered-count">0</span>
                        <span class="fc-stat-label">Mastered</span>
                    </div>
                    <div class="fc-stat">
                        <span class="fc-stat-value" id="fc-total-count">0</span>
                        <span class="fc-stat-label">Total</span>
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="fc-progress-bar">
                    <div class="fc-progress-fill" id="fc-progress-fill"></div>
                </div>

                <!-- Deck Filter -->
                <div class="fc-controls">
                    <select id="fc-deck-filter" class="fc-deck-select" aria-label="Filter by deck">
                        <option value="all">All Decks</option>
                    </select>
                    <select id="fc-tag-filter" class="fc-deck-select" aria-label="Filter by tag">
                        <option value="all">All Tags</option>
                    </select>
                    <button id="fc-export-btn" class="fc-export-btn" title="Download Anki Export">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <span>Anki Export</span>
                    </button>
                </div>

                <!-- Card Container -->
                <div class="fc-card-area">
                    <!-- Empty State -->
                    <div class="fc-empty-state" id="fc-empty-state" style="display: none;">
                        <div class="fc-empty-icon">🎉</div>
                        <h3>All caught up!</h3>
                        <p>No cards due for review right now. Come back later or switch to a different deck.</p>
                    </div>

                    <!-- Card -->
                    <div class="fc-card-wrapper" id="fc-card-wrapper">
                        <div class="fc-card" id="fc-card">
                            <div class="fc-card-face fc-card-front" id="fc-card-front">
                                <div class="fc-card-badge" id="fc-card-badge">glossary</div>
                                <div class="fc-card-content" id="fc-front-content"></div>
                                <div class="fc-card-hint">Press <kbd>Space</kbd> or tap to reveal</div>
                            </div>
                            <div class="fc-card-face fc-card-back" id="fc-card-back">
                                <div class="fc-card-badge fc-card-badge-back" id="fc-card-badge-back">answer</div>
                                <div class="fc-card-content" id="fc-back-content"></div>
                                <div class="fc-card-source" id="fc-card-source"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Card Counter -->
                    <div class="fc-card-counter" id="fc-card-counter">Card 1 of 10</div>
                </div>

                <!-- Difficulty Buttons -->
                <div class="fc-actions" id="fc-actions">
                    <button class="fc-btn fc-btn-again" data-rating="1" title="Again — show in < 1 min">
                        <span class="fc-btn-label">Again</span>
                        <span class="fc-btn-interval">&lt; 1 min</span>
                        <kbd>1</kbd>
                    </button>
                    <button class="fc-btn fc-btn-hard" data-rating="2" title="Hard — show in 6 min">
                        <span class="fc-btn-label">Hard</span>
                        <span class="fc-btn-interval">6 min</span>
                        <kbd>2</kbd>
                    </button>
                    <button class="fc-btn fc-btn-good" data-rating="3" title="Good — show tomorrow">
                        <span class="fc-btn-label">Good</span>
                        <span class="fc-btn-interval">1 day</span>
                        <kbd>3</kbd>
                    </button>
                    <button class="fc-btn fc-btn-easy" data-rating="4" title="Easy — show in 4 days">
                        <span class="fc-btn-label">Easy</span>
                        <span class="fc-btn-interval">4 days</span>
                        <kbd>4</kbd>
                    </button>
                </div>
            </div>
            
            <!-- Navigation Footer (lessons) -->
            <footer class="footer-nav" id="footer-nav">
                <button id="prev-btn" class="nav-btn" aria-label="Go to previous lesson">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    <span>Previous</span>
                </button>
                
                <div class="footer-center">
                    <button id="mark-complete-btn" class="complete-btn" aria-label="Mark lesson as complete">
                        <span class="check-icon">✓</span>
                        <span class="complete-text">Mark Complete</span>
                    </button>
                    <div class="lesson-progress" id="lesson-progress">
                        <!-- Progress Info -->
                    </div>
                </div>

                <button id="next-btn" class="nav-btn primary" aria-label="Go to next lesson">
                    <span>Next</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </footer>
        </main>
    </div>

    <!-- Command Palette Modal -->
    <div class="command-palette-overlay" id="command-palette-overlay" aria-hidden="true">
        <div class="command-palette-modal" role="dialog" aria-modal="true" aria-label="Search lessons">
            <div class="palette-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="palette-search-input" placeholder="Search lessons, topics, or courses..." autocomplete="off" spellcheck="false">
                <kbd class="esc-badge">ESC</kbd>
            </div>
            <div class="palette-results" id="palette-results" role="listbox">
                <!-- Dynamically populated -->
            </div>
            <div class="palette-footer">
                <span class="hint"><kbd>↑</kbd> <kbd>↓</kbd> to navigate</span>
                <span class="hint"><kbd>↵</kbd> to open</span>
                <span class="hint"><kbd>ESC</kbd> to close</span>
            </div>
        </div>
    </div>

    <!-- Data and Logic -->
    <script src="data.js"></script>
    <script src="flashcard-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
